<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Para ti 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0d0d;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
      position: relative;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, #2d0f1a 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, #1a1205 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0f1a10 0%, #0a0505 100%);
      z-index: 0;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: #8b2252; top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: #4a7c3f; bottom: -80px; right: -80px; animation-delay: -3s; }
    .orb-3 { width: 250px; height: 250px; background: #c4632a; bottom: 30%; left: 10%; animation-delay: -1.5s; }
    @keyframes pulse {
      from { transform: scale(1); opacity: 0.15; }
      to   { transform: scale(1.2); opacity: 0.25; }
    }

    /* ── PANTALLA DE INTRO ── */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .intro.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-emoji {
      font-size: 4.5rem;
      filter: drop-shadow(0 0 30px rgba(255,150,100,0.7));
      animation: floatGift 2.5s ease-in-out infinite;
    }
    @keyframes floatGift {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-14px) scale(1.07); }
    }

    .intro-text {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: rgba(245, 220, 180, 0.65);
      letter-spacing: 0.06em;
      text-align: center;
      padding: 0 2rem;
    }

    .intro-btn {
      padding: 0.9rem 2.6rem;
      background: rgba(255, 200, 130, 0.07);
      border: 1px solid rgba(255, 200, 130, 0.32);
      border-radius: 50px;
      color: rgba(255, 220, 170, 0.9);
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 1.05rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s, transform 0.2s;
      animation: breathe 2.5s ease-in-out infinite;
    }
    .intro-btn:hover {
      background: rgba(255, 200, 130, 0.16);
      border-color: rgba(255, 200, 130, 0.6);
      transform: scale(1.05);
    }
    @keyframes breathe {
      0%,100% { box-shadow: 0 0 12px rgba(255,180,100,0.15); }
      50%      { box-shadow: 0 0 30px rgba(255,180,100,0.38); }
    }

    /* ── EXPLOSIÓN ── */
    .burst-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
    }
    .burst-petal {
      position: absolute;
      pointer-events: none;
      animation: burstFly 1.1s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    }
    @keyframes burstFly {
      0%   { opacity: 1; transform: translate(0,0) scale(0.2) rotate(0deg); }
      55%  { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.1) rotate(var(--rot)); }
    }

    /* ── PÉTALOS CAYENDO ── */
    .petals-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .petal {
      position: absolute;
      top: -60px;
      opacity: 0;
      animation: fallDown linear infinite;
      filter: drop-shadow(0 0 6px rgba(255,180,150,0.4));
      user-select: none;
    }
    @keyframes fallDown {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.8); }
      5%   { opacity: 0.8; }
      90%  { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(110vh) rotate(360deg) scale(1.1); }
    }

    /* ── TARJETA ── */
    .card-wrapper {
      position: relative;
      z-index: 10;
      opacity: 0;
      transform: translateY(40px) scale(0.93);
      transition: opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card-wrapper.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .card {
      width: clamp(300px, 85vw, 480px);
      background: rgba(255, 248, 240, 0.04);
      border: 1px solid rgba(255, 200, 150, 0.18);
      border-radius: 20px;
      padding: 3rem 2.8rem 2.4rem;
      text-align: center;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,180,120,0.08) inset,
        0 8px 64px rgba(0,0,0,0.6),
        0 0 120px rgba(180,80,80,0.08);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -50%; left: -60%;
      width: 40%; height: 200%;
      background: linear-gradient(100deg, transparent, rgba(255,220,180,0.06), transparent);
      transform: skewX(-20deg);
      animation: shimmer 5s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%,100% { left: -60%; opacity: 0; }
      40%      { opacity: 1; }
      60%      { left: 130%; opacity: 0; }
    }

    .corner-flower {
      position: absolute;
      font-size: 1.6rem;
      opacity: 0.55;
      filter: drop-shadow(0 0 8px rgba(255,150,100,0.5));
      animation: floatCorner 4s ease-in-out infinite alternate;
    }
    .cf-tl { top: 14px; left: 18px; animation-delay: 0s; }
    .cf-tr { top: 14px; right: 18px; animation-delay: -1s; }
    .cf-bl { bottom: 14px; left: 18px; animation-delay: -2s; }
    .cf-br { bottom: 14px; right: 18px; animation-delay: -3s; }
    @keyframes floatCorner {
      from { transform: translateY(0) rotate(-5deg); }
      to   { transform: translateY(-5px) rotate(5deg); }
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      justify-content: center;
      margin: 1.2rem 0;
      color: rgba(255,190,130,0.4);
      font-size: 0.85rem;
    }
    .divider span { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(255,190,130,0.3), transparent); }

    .label-top {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 180, 120, 0.55);
      margin-bottom: 1.4rem;
    }

    .title {
      font-size: clamp(2rem, 6vw, 2.7rem);
      font-weight: 300;
      line-height: 1.25;
      color: #f5e6d0;
      margin-bottom: 0.3rem;
      letter-spacing: 0.01em;
      text-shadow: 0 0 40px rgba(255,180,100,0.2);
    }
    .title em { font-style: italic; color: #e8c4a0; }

    .flower-main {
      font-size: 3.5rem;
      display: block;
      margin: 1.4rem auto 1rem;
      filter: drop-shadow(0 0 20px rgba(255,140,100,0.6));
      animation: floatMain 3.5s ease-in-out infinite;
    }
    @keyframes floatMain {
      0%,100% { transform: translateY(0) rotate(-3deg) scale(1); }
      50%      { transform: translateY(-10px) rotate(3deg) scale(1.05); }
    }

    .message {
      font-size: clamp(0.98rem, 2.8vw, 1.12rem);
      font-style: italic;
      line-height: 1.85;
      color: rgba(245, 225, 200, 0.78);
      margin-top: 0.5rem;
      padding: 0 0.5rem;
    }

    .firma {
      margin-top: 1.8rem;
      font-family: 'Lora', serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: rgba(255, 180, 100, 0.6);
      font-style: italic;
    }

    .sparkle {
      position: fixed;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #ffd6a5;
      pointer-events: none;
      z-index: 2;
      animation: twinkle ease-in-out infinite;
      box-shadow: 0 0 6px 2px rgba(255,200,120,0.6);
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(0.5); }
      50%      { opacity: 1; transform: scale(1.5); }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="petals-container" id="petals"></div>
  <div class="burst-container" id="burst"></div>

  <!-- INTRO -->
  <div class="intro" id="intro">
    <div class="intro-emoji">🎁</div>
    <p class="intro-text">Tienes un regalito esperándote</p>
    <button class="intro-btn" id="openBtn">Abrir ✦</button>
  </div>

  <!-- TARJETA -->
  <div class="card-wrapper" id="card">
    <div class="card">
      <span class="corner-flower cf-tl">🌸</span>
      <span class="corner-flower cf-tr">🌷</span>
      <span class="corner-flower cf-bl">🏵️</span>
      <span class="corner-flower cf-br">🌺</span>

      <p class="label-top">✦ un pequeño detalle ✦</p>
      <h1 class="title">Para ti,<br><em>con cariño</em></h1>
      <span class="flower-main">💐</span>

      <div class="divider"><span></span>🏵️<span></span></div>

      <p class="message">
        Me cuesta un poco expresarme en palabras,<br>
        pero este detalle es para decirte que<br>
        tú eres alguien especial para mí.<br><br>
        Espero haberte sacado una sonrisa.
      </p>

      <p class="firma">— Jcris</p>
    </div>
  </div>

  <script>
    const emojis    = ['🌸','🌺','🏵️','🍃','🌿','🌼','💮'];
    const container = document.getElementById('petals');
    const burstEl   = document.getElementById('burst');
    const intro     = document.getElementById('intro');
    const card      = document.getElementById('card');
    const openBtn   = document.getElementById('openBtn');

    // Pétalos cayendo de fondo
    function createPetal() {
      const el = document.createElement('div');
      el.className = 'petal';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
      const dur = 6 + Math.random() * 8;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (Math.random() * dur) + 's';
      container.appendChild(el);
      setTimeout(() => el.remove(), dur * 2 * 1000);
    }
    for (let i = 0; i < 28; i++) createPetal();
    setInterval(createPetal, 700);

    // Sparkles
    function createSparkle() {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top  = Math.random() * 100 + 'vh';
      const dur = 2 + Math.random() * 3;
      s.style.animationDuration = dur + 's';
      s.style.animationDelay   = (Math.random() * dur) + 's';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), dur * 2 * 1000);
    }
    for (let i = 0; i < 18; i++) createSparkle();
    setInterval(createSparkle, 1200);

    // Explosión de flores desde el centro
    function burst() {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const burstEmojis = ['🌸','🌺','🏵️','🌼','💐','🌿','🍃','💮','🌸','🌷','🌺','🌼','🌸','🌿'];

      burstEmojis.forEach((em, i) => {
        const el = document.createElement('div');
        el.className = 'burst-petal';
        el.textContent = em;

        const angle = (i / burstEmojis.length) * 360 + (Math.random() - 0.5) * 25;
        const dist  = 100 + Math.random() * 220;
        const rad   = angle * Math.PI / 180;
        const tx    = Math.cos(rad) * dist;
        const ty    = Math.sin(rad) * dist;
        const rot   = ((Math.random() - 0.5) * 540) + 'deg';

        el.style.cssText = `
          left: ${cx}px;
          top: ${cy}px;
          --tx: ${tx}px;
          --ty: ${ty}px;
          --rot: ${rot};
          font-size: ${1.5 + Math.random() * 1.4}rem;
          animation-delay: ${i * 0.025}s;
        `;
        burstEl.appendChild(el);
        setTimeout(() => el.remove(), 1500);
      });
    }

    openBtn.addEventListener('click', () => {
      burst();
      setTimeout(() => {
        intro.classList.add('hidden');
        setTimeout(() => card.classList.add('visible'), 300);
      }, 550);
    });
  </script>
</body>
</html>
